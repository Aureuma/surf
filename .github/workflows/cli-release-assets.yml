name: CLI Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release version tag to validate or publish (for example v0.2.2)
        required: true
        type: string
      ref:
        description: Git ref to checkout for workflow_dispatch runs; defaults to the current ref unless publish is enabled
        required: false
        type: string
      publish:
        description: Publish assets to the GitHub Release and GHCR instead of running a validation-only build
        required: true
        default: false
        type: boolean

concurrency:
  group: surf-cli-release-assets-${{ github.event.release.tag_name || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write
  packages: write

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      publish: ${{ steps.resolve.outputs.publish }}
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          publish="true"
          if [[ -z "${tag}" ]]; then
            tag="${{ github.event.inputs.tag }}"
          fi
          if [[ -z "${tag}" ]]; then
            echo "No release tag provided." >&2
            exit 1
          fi
          checkout_ref="${tag}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            publish="${{ github.event.inputs.publish }}"
            checkout_ref="${{ github.event.inputs.ref }}"
            if [[ -z "${checkout_ref}" ]]; then
              if [[ "${publish}" == "true" ]]; then
                checkout_ref="${tag}"
              else
                checkout_ref="${{ github.ref_name }}"
              fi
            fi
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "checkout_ref=${checkout_ref}" >> "${GITHUB_OUTPUT}"
          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"

  ensure-release:
    needs: [resolve-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists for tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-tag.outputs.tag }}"
          if [[ "${{ needs.resolve-tag.outputs.publish }}" != "true" ]]; then
            echo "Validation-only workflow_dispatch run; no release required."
            exit 0
          fi
          if gh release view "${tag}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists."
            exit 0
          fi
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            echo "Release ${tag} is missing for event ${{ github.event_name }}." >&2
            exit 1
          fi
          gh release create "${tag}" \
            --repo "${{ github.repository }}" \
            --verify-tag \
            --draft \
            --title "${tag}" \
            --notes "Draft release created by workflow_dispatch for CLI asset publication."

  publish-assets:
    needs: [resolve-tag, ensure-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux_amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_suffix: linux_arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_suffix: darwin_amd64
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_suffix: darwin_arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Require green CI for release commit
        if: ${{ needs.resolve-tag.outputs.publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          success_count="$(
            gh api \
              "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${sha}&status=completed&per_page=50" \
              --jq '[.workflow_runs[] | select(.conclusion == "success")] | length'
          )"
          if [[ "${success_count}" -lt 1 ]]; then
            echo "No successful CI run found for commit ${sha}. Run CI first and retry release." >&2
            exit 1
          fi
          echo "Found ${success_count} successful CI run(s) for commit ${sha}."

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release tag and CLI version
        run: |
          set -euo pipefail
          cargo run --locked -p xtask -- validate-release-version --tag "${{ needs.resolve-tag.outputs.tag }}"

      - name: Build release archive
        run: |
          set -euo pipefail
          cargo run --locked -p xtask -- build-release-asset --version "${{ needs.resolve-tag.outputs.tag }}" --target "${{ matrix.target }}" --archive-suffix "${{ matrix.archive_suffix }}" --out-dir dist
          ls -lah dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: surf-${{ matrix.archive_suffix }}
          path: dist/*.tar.gz

  assemble-assets:
    needs: [resolve-tag, ensure-release, publish-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download built archives
        uses: actions/download-artifact@v4
        with:
          pattern: surf-*
          path: dist
          merge-multiple: true

      - name: Write release checksums
        run: |
          set -euo pipefail
          cargo run --locked -p xtask -- write-checksums --dir dist
          ls -lah dist

      - name: Upload assets to GitHub Release
        if: ${{ needs.resolve-tag.outputs.publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-tag.outputs.tag }}"
          gh release view "${tag}" --repo "${{ github.repository }}" >/dev/null
          gh release upload "${tag}" dist/*.tar.gz dist/checksums.txt --repo "${{ github.repository }}" --clobber

      - name: Upload checksum artifact
        if: ${{ needs.resolve-tag.outputs.publish != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: surf-checksums
          path: dist/checksums.txt

      - name: Attest release artifacts
        if: ${{ needs.resolve-tag.outputs.publish == 'true' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt

  publish-ghcr:
    needs: [resolve-tag, ensure-release]
    if: ${{ needs.resolve-tag.outputs.publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aureuma/surf-browser
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.resolve-tag.outputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=ref,event=tag
            type=sha

      - name: Build and push browser image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./runtime/browser/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  verify-release-distribution:
    name: Verify release assets
    needs: [resolve-tag, ensure-release, assemble-assets, publish-ghcr]
    if: ${{ needs.resolve-tag.outputs.publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify release distribution state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-tag.outputs.tag }}"
          version="${tag#v}"

          assets="$(gh release view "${tag}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')"
          required_assets=(
            "surf_${version}_linux_amd64.tar.gz"
            "surf_${version}_linux_arm64.tar.gz"
            "surf_${version}_darwin_amd64.tar.gz"
            "surf_${version}_darwin_arm64.tar.gz"
            "checksums.txt"
          )
          for asset in "${required_assets[@]}"; do
            if ! grep -Fxq "${asset}" <<<"${assets}"; then
              echo "missing release asset: ${asset}" >&2
              exit 1
            fi
          done
          echo "release assets verified for ${tag}"
