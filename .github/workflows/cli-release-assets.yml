name: CLI Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build/upload (for example v0.1.0)
        required: true
        type: string

concurrency:
  group: surf-cli-release-assets-${{ github.event.release.tag_name || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write
  packages: write

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          if [[ -z "${tag}" ]]; then
            tag="${{ github.event.inputs.tag }}"
          fi
          if [[ -z "${tag}" ]]; then
            echo "No release tag provided." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  publish-assets:
    needs: [resolve-tag]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux_amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_suffix: linux_arm64
          - runner: macos-13
            target: x86_64-apple-darwin
            archive_suffix: darwin_amd64
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_suffix: darwin_arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Require green CI for release commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          success_count="$(
            gh api \
              "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${sha}&status=completed&per_page=50" \
              --jq '[.workflow_runs[] | select(.conclusion == "success")] | length'
          )"
          if [[ "${success_count}" -lt 1 ]]; then
            echo "No successful CI run found for commit ${sha}. Run CI first and retry release." >&2
            exit 1
          fi
          echo "Found ${success_count} successful CI run(s) for commit ${sha}."

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release tag and CLI version
        run: |
          set -euo pipefail
          cargo run --locked -p xtask -- validate-release-version --tag "${{ needs.resolve-tag.outputs.tag }}"

      - name: Build release archive
        run: |
          set -euo pipefail
          cargo run --locked -p xtask -- build-release-asset --version "${{ needs.resolve-tag.outputs.tag }}" --target "${{ matrix.target }}" --archive-suffix "${{ matrix.archive_suffix }}" --out-dir dist
          ls -lah dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: surf-${{ matrix.archive_suffix }}
          path: dist/*.tar.gz

  assemble-assets:
    needs: [resolve-tag, publish-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download built archives
        uses: actions/download-artifact@v4
        with:
          pattern: surf-*
          path: dist
          merge-multiple: true

      - name: Write release checksums
        run: |
          set -euo pipefail
          cargo run --locked -p xtask -- write-checksums --dir dist
          ls -lah dist

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-tag.outputs.tag }}"
          gh release view "${tag}" --repo "${{ github.repository }}" >/dev/null
          gh release upload "${tag}" dist/*.tar.gz dist/checksums.txt --repo "${{ github.repository }}" --clobber

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt

  publish-ghcr:
    needs: [resolve-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aureuma/surf-browser
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build and push browser image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./runtime/browser/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  verify-release-distribution:
    name: Verify release assets
    needs: [resolve-tag, assemble-assets, publish-ghcr]
    runs-on: ubuntu-latest
    steps:
      - name: Verify release distribution state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-tag.outputs.tag }}"
          version="${tag#v}"

          assets="$(gh release view "${tag}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')"
          required_assets=(
            "surf_${version}_linux_amd64.tar.gz"
            "surf_${version}_linux_arm64.tar.gz"
            "surf_${version}_darwin_amd64.tar.gz"
            "surf_${version}_darwin_arm64.tar.gz"
            "checksums.txt"
          )
          for asset in "${required_assets[@]}"; do
            if ! grep -Fxq "${asset}" <<<"${assets}"; then
              echo "missing release asset: ${asset}" >&2
              exit 1
            fi
          done
          echo "release assets verified for ${tag}"
